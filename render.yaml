services:
  - type: web
    name: dodge-ai-o2c-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --app-dir backend --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: "10000"
      - key: ALLOWED_ORIGINS
        value: "*"
